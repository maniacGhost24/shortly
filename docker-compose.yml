services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shortly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_URL: jdbc:postgresql://db:5432/shortly
      DB_USER: postgres
      DB_PASS: password
      BASE_URL: http://localhost:8080